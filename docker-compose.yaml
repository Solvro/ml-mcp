services:
  neo4j_db:
    image: neo4j:5.18
    container_name: ml-mcp-neo4j
    networks:
      - mcp_network
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?set in .env}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p 12345678 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - mcp_network
    ports:
      -  "8005:8005"
    environment:
      - NEO4J_URI=bolt://neo4j_db:7687
    env_file:
      - .env
    depends_on:
      neo4j_db:
        condition: service_healthy


volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:

networks:
  mcp_network:
    driver: bridge
