servers:
  mcp:
    transport: "http"
    port: 8005
    host: "127.0.0.1"

  topwr_api:
    host: "0.0.0.0"
    port: 8000
    cors_origins: "*"

rag:
  max_results: 5
  enable_debug: false

data_pipeline:
  max_chunk_size: 30000
  chunk_overlap: 200
  token_limit: 65536

llm:
  fast_model:
    name: "gpt-5.4-nano"
    temperature: 0.1
  accurate_model:
    name: "gpt-5.4-mini"
    temperature: 0
  clarin:
    name: "pllum"
    base_url: "https://services.clarin-pl.eu/api/v1/oapi"
  gemini:
    name: "gemini-2.5-flash-lite"

observability:
  langfuse:
    host: ${LANGFUSE_HOST}
    secret_key: ${LANGFUSE_SECRET_KEY}
    public_key: ${LANGFUSE_PUBLIC_KEY}

database:
  name: "neo4j"
  uri: ${NEO4J_URI}
  username: ${NEO4J_USER}
  password: ${NEO4J_PASSWORD}

prompts:
  final_answer: |
    You receive information in JSON format from another LLM
    containing data from the knowledge base.

    Context: You are an assistant for Wrocław University of Science and Technology (Politechnika Wrocławska, PWr).
    Assume that any mention of professors, teachers, courses, classes, departments, or other academic entities
    refers to Politechnika Wrocławska unless explicitly stated otherwise.

    Conversation history (most recent turns):
    {history}

    User question: {user_input}

    Knowledge base data (JSON format):
    {data}

    Your task is to answer the user's question based on this information.
    Use the conversation history to resolve references like "he", "she", "that course", "who is that guy?", etc.
    Use all data from the JSON to provide a complete answer.
    Always respond in the same language as the user's question, in a natural and concise way.
    If you do not receive relevant information, answer from general knowledge about Politechnika Wrocławska.

  cypher_insert: |
    Extract knowledge from the provided context into Neo4j Cypher MERGE statements.
    Invent node labels and relationship types that best represent the content.
    Use the current graph schema to stay consistent with existing structure where appropriate.
    DO NOT include any additional text or explanations.

    CONTEXT: {context}

    CURRENT GRAPH SCHEMA (use for consistency, extend freely):
    {schema_context}

    STRICT RULES:
    1. OUTPUT MUST:
       - Contain ONLY executable Cypher statements
       - Begin with "MERGE"
       - Separate multiple statements with PIPE character (|)
       - Use UNIQUE variable names (node1, node2, etc. - never reused)
       - LIMIT TOKENS TO 65536 TO AVOID ERRORS WITH DEEPSEEK API

    2. FOR NODES:
       - MERGE each node with unique variable name
       - Include 'title' and 'context' properties
       - Replace Polish characters (ą→a, ć→c, ę→e, ł→l, ń→n, ó→o, ś→s, ź→z, ż→z)
       - Use ONLY ASCII characters
       - Escape single quotes in text with backslash (\')

    3. FOR RELATIONSHIPS:
       - MERGE between existing node variables
       - Use descriptive relationship type names in UPPER_SNAKE_CASE
       - Direction matters (A→B ≠ B→A)

    4. VARIABLE NAMES:
       - Must be UNIQUE across entire query
       - Recommended pattern: (node1), (node2), (person1), (dept1), etc.
       - NEVER reuse variables - this causes errors

    EXAMPLE OUTPUT:
    MERGE (node1:Person {{title: 'John Smith',
    context: 'Professor at UW'}})|MERGE (node2:Department
    {{title: 'Computer Science', context: 'CS department'}})|MERGE
    (node1)-[:WORKS_IN]->(node2)

    OUTPUT MUST BE EXACTLY IN THIS FORMAT:
    MERGE (...) [|MERGE (...)]* [|MERGE (...)-[:...]->(...)]*
    NO OTHER TEXT OR CHARACTERS ALLOWED!

  schema_reflection: |
    Analyze the current Neo4j graph schema and summarize it to guide the next extraction pass.

    SCHEMA:
    {schema}

    Respond in this exact format:
    NODE TYPES: <comma-separated labels with node counts if available>
    RELATIONSHIP TYPES: <comma-separated relationship types>
    OBSERVATIONS: <1-2 sentences on structure patterns or notable gaps>
    EXTRACTION HINTS: <what types of entities or relations to prioritize next>

  cypher_search: |
    Generate a single valid Cypher READ query to answer the question. No explanations, no markdown.

    Schema (includes sample property values):
    {schema}

    Question: {user_question}

    Rules:
    - Use MATCH, not MERGE or CREATE
    - For string properties use case-insensitive fuzzy matching: toLower(n.title) CONTAINS toLower('...')
    - Always RETURN named properties, not full nodes (e.g. RETURN p.title, c.title)
    - Always add LIMIT 10

    Cypher:

  guardrails: |
    You are a classifier for a Wrocław University of Science and Technology (Politechnika Wrocławska) assistant.
    Assume that any question mentioning professors, teachers, courses, classes, departments, buildings,
    research, or other academic topics refers to Politechnika Wrocławska.
    Is this question related to university topics (answer "generate_cypher") or completely unrelated (answer "end")?
    Answer ONLY: "generate_cypher" or "end"

    Question: {user_question}
    Answer:
